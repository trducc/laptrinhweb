<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Hỗ trợ TroHD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .hover-menu:hover { background: rgba(255, 255, 255, 0.1); opacity: 1 !important; }
        .active-menu { background: #0d6efd !important; opacity: 1 !important; }
        .admin-sidebar { width: 260px; height: 100vh; position: fixed; display: flex; flex-direction: column; z-index: 1000; }
        .admin-content { margin-left: 260px; padding: 2rem; }
        .card-stat { transition: transform 0.3s; }
        .card-stat:hover { transform: translateY(-5px); }
        .status-badge { padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    </style>
</head>
<body class="bg-light admin-body">

    <div class="admin-sidebar bg-dark text-white shadow">
        <div class="p-4 border-bottom border-secondary text-center">
            <h4 class="fw-bold mb-0 text-primary"><i class="fa-solid fa-user-shield me-2"></i>Admin Panel</h4>
        </div>
        <ul class="nav flex-column py-3 fw-medium flex-grow-1">
            <li class="nav-item">
                <a class="nav-link text-white opacity-75 hover-menu py-3" href="admin.html">
                    <i class="fa-solid fa-house-chimney me-3"></i>Quản lý tin đăng
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white active-menu py-3 d-flex justify-content-between align-items-center" href="admin-hotro.html">
                    <span><i class="fa-solid fa-headset me-3"></i>Quản lý hỗ trợ</span>
                    <span class="badge bg-danger rounded-pill d-none" id="badge-hotro">0</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white opacity-75 hover-menu py-3" href="admin-nguoidung.html">
                    <i class="fa-solid fa-users me-3"></i>Người dùng
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white opacity-75 hover-menu py-3" href="admin-thongke.html">
                    <i class="fa-solid fa-chart-pie me-3"></i>Thống kê
                </a>
            </li>
        </ul>
        <div class="p-4 border-top border-secondary">
            <a href="javascript:void(0)" class="btn btn-outline-danger w-100 fw-bold rounded-pill" onclick="xacNhanDangXuat()">
                <i class="fa-solid fa-right-from-bracket me-2"></i>Đăng xuất
            </a>
        </div>
    </div>

    <div class="admin-content">
        <nav class="navbar bg-white shadow-sm px-4 py-3 mb-4 rounded-3 d-flex justify-content-between align-items-center">
            <h5 class="fw-bold mb-0">Hệ thống quản lý hỗ trợ</h5>
            <div class="d-flex align-items-center gap-3">
                <span class="fw-bold text-dark" id="tenAdmin">Xin chào, Admin!</span>
                <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" class="rounded-circle" width="40">
            </div>
        </nav>

        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-primary text-white p-4 card-stat">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1 opacity-75 small fw-bold text-uppercase">Tổng yêu cầu</h6>
                            <h2 class="fw-bold mb-0" id="stat-tong">0</h2>
                        </div>
                        <i class="fa-solid fa-envelope-open-text fs-1 opacity-25"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-warning text-white p-4 card-stat">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1 opacity-75 small fw-bold text-uppercase">Chờ xử lý</h6>
                            <h2 class="fw-bold mb-0" id="stat-cho">0</h2>
                        </div>
                        <i class="fa-solid fa-clock-rotate-left fs-1 opacity-25"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 bg-success text-white p-4 card-stat">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1 opacity-75 small fw-bold text-uppercase">Đã giải quyết</h6>
                            <h2 class="fw-bold mb-0" id="stat-xong">0</h2>
                        </div>
                        <i class="fa-solid fa-check-double fs-1 opacity-25"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-4 shadow-sm border">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr class="text-secondary small text-uppercase">
                            <th scope="col" class="ps-3">Người gửi</th>
                            <th scope="col">Liên hệ</th>
                            <th scope="col">Nội dung</th>
                            <th scope="col">Thời gian</th>
                            <th scope="col">Trạng thái</th>
                            <th scope="col" class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="bang-ho-tro"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Bảo mật: Chỉ cho phép QUAN_TRI
        if(localStorage.getItem('vaiTro') !== 'QUAN_TRI') window.location.href = 'dangnhap.html';
        document.getElementById('tenAdmin').innerText = 'Xin chào, ' + (localStorage.getItem('taiKhoan') || 'Admin') + '!';

        async function taiDanhSachHoTro() {
            try {
                const res = await fetch('http://127.0.0.1:9090/api/danh-sach-ho-tro');
                const data = await res.json();
                
                // Đồng bộ logic số nguyên: 0 là chờ, 1 là xong
                const choXuLy = data.filter(h => h.trangThai === 0).length;
                const daXuLy = data.filter(h => h.trangThai === 1).length;

                document.getElementById('stat-tong').innerText = data.length;
                document.getElementById('stat-cho').innerText = choXuLy;
                document.getElementById('stat-xong').innerText = daXuLy;

                // Cập nhật badge ở sidebar
                const badgeSidebar = document.getElementById('badge-hotro');
                if(choXuLy > 0) {
                    badgeSidebar.innerText = choXuLy;
                    badgeSidebar.classList.remove('d-none');
                } else {
                    badgeSidebar.classList.add('d-none');
                }

                let html = '';
                data.reverse().forEach(h => {
                    const dependsOnStatus = h.trangThai === 0;
                    html += `
                    <tr>
                        <td class="ps-3 fw-bold text-primary">${h.hoTen}</td>
                        <td><span class="badge bg-light text-dark border">${h.lienHe}</span></td>
                        <td><div class="text-wrap" style="max-width: 300px; font-size: 0.9rem;">${h.noiDung}</div></td>
                        <td><small class="text-muted">${h.thoiGian || 'Vừa xong'}</small></td>
                        <td>
                            <span class="badge ${dependsOnStatus ? 'bg-warning' : 'bg-success'} rounded-pill px-3">
                                ${dependsOnStatus ? '⏳ Chờ xử lý' : '✅ Đã xong'}
                            </span>
                        </td>
                        <td class="text-center">
                            ${dependsOnStatus ? 
                                `<button class="btn btn-sm btn-primary rounded-pill px-3 fw-bold" onclick="xacNhanGiaiQuyet(${h.maHoTro})">Xử lý</button>` : 
                                `<i class="fa-solid fa-circle-check text-success fs-5"></i>`
                            }
                        </td>
                    </tr>`;
                });
                document.getElementById('bang-ho-tro').innerHTML = html || '<tr><td colspan="6" class="text-center py-5 text-muted">Hiện chưa có yêu cầu hỗ trợ nào.</td></tr>';
            } catch (err) { 
                console.error("Lỗi tải danh sách: ", err); 
                document.getElementById('bang-ho-tro').innerHTML = '<tr><td colspan="6" class="text-center py-5 text-danger fw-bold">Lỗi kết nối máy chủ Backend!</td></tr>';
            }
        }

        function xacNhanGiaiQuyet(id) {
            hienThiThongBao(
                "Xác nhận xử lý", 
                `Bạn đã giải quyết xong yêu cầu hỗ trợ #${id} này chứ?`, 
                "xacnhan", 
                () => thucHienCapNhat(id)
            );
        }

        async function thucHienCapNhat(id) {
            const maAdmin = localStorage.getItem("maNguoiDung");
            try {
                const res = await fetch(`http://127.0.0.1:9090/api/phan-hoi-ho-tro/${id}?maAdmin=${maAdmin}`, {
                    method: 'POST'
                });
                
                if (res.ok) {
                    hienThiThongBao("Thành công", "Đã đánh dấu yêu cầu là đã giải quyết!", "thanhcong");
                    taiDanhSachHoTro();
                } else {
                    hienThiThongBao("Thất bại", "Bạn không có quyền hoặc server bị lỗi!", "loi");
                }
            } catch (err) {
                hienThiThongBao("Lỗi kết nối", "Không thể gọi API xử lý!", "loi");
            }
        }

        document.addEventListener("DOMContentLoaded", taiDanhSachHoTro);
        // Tự động làm mới sau mỗi 30 giây để cập nhật tin mới
        setInterval(taiDanhSachHoTro, 30000);
    </script>
</body>
</html>
