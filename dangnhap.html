<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TroHD - Đăng nhập</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="TroHD" height="40">
            </a>
            <div class="navbar-collapse">
                <ul class="navbar-nav mx-auto fw-bold gap-3 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="danhsach.html">Danh sách phòng</a></li>
                    <li class="nav-item"><a class="nav-link" href="dangtin.html">Đăng tin</a></li>
                    <li class="nav-item"><a class="nav-link" href="yeuthich.html">Yêu thích</a></li>
                    <li class="nav-item"><a class="nav-link" href="hotro.html">Hỗ trợ</a></li>
                </ul>
                <div class="d-flex gap-2 align-items-center flex-nowrap">
                    <div id="user-auth-zone" class="d-inline-flex gap-2 align-items-center text-nowrap">
                        <a href="dangnhap.html" class="btn btn-outline-primary fw-bold px-4 btn-sm active">Đăng nhập</a>
                        <a href="dangky.html" class="btn btn-primary fw-bold px-4 btn-sm">Đăng ký</a>
                    </div>
                    <button class="btn btn-light rounded-circle shadow-sm ms-2" id="darkModeToggle" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                        <i class="fa-solid fa-moon" id="themeIcon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>
    
    <section class="py-5 min-vh-100 d-flex align-items-center bg-light">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8">
                    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <h2 class="fw-bold text-primary">Đăng nhập</h2>
                                <p class="text-muted">Chào mừng bạn quay trở lại với TroHD!</p>
                            </div>
                            <form id="formLogin">
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Tên đăng nhập <span class="text-danger">*</span></label>
                                    <input type="text" id="tenDangNhap" class="form-control form-control-lg bg-light fs-6" placeholder="Nhập tên đăng nhập">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Mật khẩu <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <input type="password" id="mkdn" class="form-control form-control-lg bg-light fs-6 border-end-0" placeholder="Nhập mật khẩu">
                                        <span class="input-group-text bg-light border-start-0" style="cursor: pointer;" onclick="togglePass('mkdn', 'eyedn')">
                                            <i class="fa-solid fa-eye-slash text-muted" id="eyedn"></i>
                                        </span>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-start align-items-center mb-4">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="rememberMe">
                                        <label class="form-check-label text-muted small" for="rememberMe">Ghi nhớ đăng nhập</label>
                                    </div>
                                </div>
                                
                                <div id="thongBaoLoi" class="alert alert-danger mb-3 text-center fw-bold small" style="display: none;"></div>
                                
                                <button type="button" id="btnMainLogin" class="btn btn-primary w-100 btn-lg fw-bold rounded-pill mb-4" onclick="goiAPI_DangNhap()">
                                    Đăng nhập ngay
                                </button>
                                
                                <div class="text-center text-muted small">
                                    Chưa có tài khoản? <a href="dangky.html" class="text-primary fw-bold text-decoration-none">Đăng ký ngay</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="modalDangNhap" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-body text-center p-5">
                    <div class="text-success mb-4">
                        <i class="fa-solid fa-circle-check" style="font-size: 5rem;"></i>
                    </div>
                    <h3 class="fw-bold mb-3">Đăng nhập thành công!</h3>
                    <p class="text-muted mb-4">Hệ thống đang đưa bạn đến Trang chủ...</p>
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white py-5 mt-auto border-top text-center">
        <div class="container">
            <img src="images/logo.png" alt="TroHD" height="30" class="mb-3 opacity-50">
            <p class="text-muted small mb-0">© 2026 Developed by Tran Van Duc. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const isRemembered = localStorage.getItem("rememberMe");
            const savedUser = localStorage.getItem("savedUser");
            const savedPass = localStorage.getItem("savedPass");

            if (isRemembered === "true" && savedUser && savedPass) {
                document.getElementById('tenDangNhap').value = savedUser;
                document.getElementById('mkdn').value = savedPass;
                document.getElementById('rememberMe').checked = true;
            }
        });

        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.className = "fa-solid fa-eye";
            } else {
                input.type = "password";
                icon.className = "fa-solid fa-eye-slash";
            }
        }

        function goiAPI_DangNhap() {
            let tk = document.getElementById('tenDangNhap').value.trim();
            let mk = document.getElementById('mkdn').value;
            let checkGhiNho = document.getElementById('rememberMe').checked;
            let thongBao = document.getElementById('thongBaoLoi');
            let btn = document.getElementById('btnMainLogin');

            if (!tk || !mk) {
                thongBao.innerText = "Vui lòng nhập đầy đủ thông tin!";
                thongBao.style.display = 'block';
                return;
            }

            thongBao.style.display = 'none';
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Đang kiểm tra...';

            fetch('http://localhost:9090/api/dang-nhap', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tenDangNhap: tk, matKhau: mk })
            })
            .then(async response => {
                const text = await response.text();
                if (!response.ok || text === "SAI") throw new Error("SAI");
                return JSON.parse(text);
            })
            .then(data => {
                localStorage.setItem("maNguoiDung", data.maNguoiDung);
                localStorage.setItem("taiKhoan", data.tenDangNhap);
                localStorage.setItem("vaiTro", data.quyenHan);

                if (checkGhiNho) {
                    localStorage.setItem("rememberMe", "true");
                    localStorage.setItem("savedUser", tk);
                    localStorage.setItem("savedPass", mk);
                } else {
                    localStorage.removeItem("rememberMe");
                    localStorage.removeItem("savedUser");
                    localStorage.removeItem("savedPass");
                }

                new bootstrap.Modal(document.getElementById('modalDangNhap')).show();
                setTimeout(() => { window.location.href = "index.html"; }, 1500);
            })
            .catch(error => {
                btn.innerText = 'Đăng nhập ngay';
                thongBao.innerText = error.message === "SAI" ? "Sai tài khoản hoặc mật khẩu!" : "Lỗi kết nối Server!";
                thongBao.style.display = 'block';
            });
        }
    </script>
</body>
</html>
